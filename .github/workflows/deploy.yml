name: Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  # Фронтенд: Vite-сборка → Cloudflare Pages (проект kubrdom-portal)
  deploy-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm install
      - run: npm run build

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=kubrdom-portal

  # Бэкенд: Worker kubrdom-portal-api (src/worker.js) + D1 banya-db.
  # ОТКЛЮЧЕНО (if: false): репозиторный CLOUDFLARE_API_TOKEN имеет права только
  # на Pages. Для авто-деплоя Worker'а нужен токен с правами Workers Scripts:Edit
  # + D1:Edit — создать его в дашборде и обновить секрет CLOUDFLARE_API_TOKEN
  # (с сохранением прав Pages), затем убрать `if: false`.
  # Пока Worker деплоится вручную: CLOUDFLARE_API_TOKEN=<token> wrangler deploy.
  deploy-worker:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # wrangler читает main/bindings из wrangler.toml; build фронтенда не нужен.
      # secrets: заливаем ADMIN_TOKEN в Worker (значение из GitHub-секрета через env),
      # затем deploy. Без секрета Worker fail-closed → 401, поэтому ставим вместе.
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          secrets: |
            ADMIN_TOKEN
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
