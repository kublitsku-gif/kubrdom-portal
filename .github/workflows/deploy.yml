name: Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  # Фронтенд: Vite-сборка → Cloudflare Pages (проект kubrdom-portal)
  deploy-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm install
      - run: npm run build

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=kubrdom-portal

  # Бэкенд: Worker kubrdom-portal-api (src/worker.js) + D1 + R2 + Telegram.
  # Авто-деплой включён: репозиторный CLOUDFLARE_API_TOKEN имеет права
  # Pages + Workers Scripts + R2 + D1. Секрет TG_BOT_TOKEN задан вручную и
  # сохраняется между деплоями (CI его не трогает).
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # wrangler читает main/bindings из wrangler.toml; build фронтенда не нужен.
      # secrets: заливаем ADMIN_TOKEN в Worker (значение из GitHub-секрета через env),
      # затем deploy. Без секрета Worker fail-closed → 401, поэтому ставим вместе.
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          secrets: |
            ADMIN_TOKEN
            AVITO_CLIENT_ID
            AVITO_CLIENT_SECRET
            AI_API_KEY
            KIMI_API_KEY
            TG_SALES_BOT_TOKEN
            WEBHOOK_SECRET
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          AVITO_CLIENT_ID: ${{ secrets.AVITO_CLIENT_ID }}
          AVITO_CLIENT_SECRET: ${{ secrets.AVITO_CLIENT_SECRET }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          TG_SALES_BOT_TOKEN: ${{ secrets.TG_SALES_BOT_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
