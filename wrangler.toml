name = "kubrdom-portal-api"
main = "src/worker.js"
compatibility_date = "2025-05-01"

# Привязка D1: внутри Worker доступна как env.DB
[[d1_databases]]
binding       = "DB"
database_name = "banya-db"
database_id   = "57254687-7bf1-4bf0-82cb-2e4003ea36c5"

# Привязка R2 (файлы планировок): внутри Worker доступна как env.FILES
[[r2_buckets]]
binding     = "FILES"
bucket_name = "kubrdom-files"

# Telegram: chat_id супергруппы (не секрет). Токен бота — в секрете TG_BOT_TOKEN.
# Avito: id аккаунта «Светлица» (не секрет). Ключи — в секретах AVITO_CLIENT_ID/SECRET.
# Cron: «дожим» молчащих клиентов нейропродавца — раз в сутки 06:00 UTC (~09:00 МСК).
[triggers]
crons = ["0 6 * * *"]

[vars]
TG_CHAT_ID = "-1003606281018"
AVITO_USER_ID = "401020763"
# Telegram-бот клиентских диалогов (Avito) + группа с темами. Токен — секрет TG_SALES_BOT_TOKEN.
TG_SALES_CHAT_ID = "-1004235156261"
# AI-провайдер (OpenAI-совместимый). Ключ — секрет AI_API_KEY. Сменить провайдера = поменять эти 2 + секрет.
AI_BASE_URL = "https://api.deepseek.com"
AI_MODEL = "deepseek-chat"
# Kimi (Moonshot), OpenAI-совместимый. Ключ — секрет KIMI_API_KEY. Переключатель провайдера — settings.aiProvider.
KIMI_BASE_URL = "https://api.moonshot.ai/v1"
# kimi-k2.6 — флагман (reasoning): Worker для kimi-k2* форсит temperature=1, max_tokens≥4000, без response_format
# (иначе ответ пустой). Медленнее (~15-20с), но самая мощная. Можно вернуть moonshot-v1-32k для скорости.
KIMI_MODEL = "kimi-k2.6"
# Claude (Anthropic, нативный Messages API). Ключ — секрет CLAUDE_API_KEY.
CLAUDE_MODEL = "claude-sonnet-4-6"
# GPT (OpenAI, OpenAI-совместимый). Ключ — секрет OPENAI_API_KEY.
OPENAI_BASE_URL = "https://api.openai.com/v1"
OPENAI_MODEL = "gpt-4o-mini"
# YandexGPT (Yandex Cloud). Ключ — секрет YANDEX_API_KEY. FOLDER_ID — каталог (не секрет, задаёт пользователь).
YANDEX_MODEL = "yandexgpt/latest"
YANDEX_FOLDER_ID = "b1gh7n0m534hu478vc3u"
# ── Голосовой обзвон (Voximplant) ──
# Заполнено через кабинет Voximplant: приложение «kubrdom» (ID 56473283),
# сценарий «kubrdom-voice», правило «kubrdom-outbound».
# Мозг звонка использует YandexGPT (секрет YANDEX_API_KEY + YANDEX_FOLDER_ID выше — уже есть).
# Вебхуки VoxEngine (/api/voice-brain, /api/voice-result) защищены секретом WEBHOOK_SECRET (уже есть).
# Секрет VOX_API_KEY задаётся ОТДЕЛЬНО: Cloudflare → Worker kubrdom-portal-api → Settings → Variables
#   (значение — на странице Voximplant «Настройки → API-ключи», кнопка «Показать ключ»).
VOX_ACCOUNT_ID = "11124723"
VOX_RULE_ID = "9026692"
PUBLIC_BASE_URL = "https://portal.kubrdom.ru"  # база для вебхуков VoxEngine (через Pages-прокси /api/*; свой домен не режется в РФ)
# VOX_CALLER_ID — ПОДТВЕРДИТЕ номер в Voximplant (Настройки → Caller ID), затем впишите сюда только цифры, напр. "74951234567".
