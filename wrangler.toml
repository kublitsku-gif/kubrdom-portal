name = "kubrdom-portal-api"
main = "src/worker.js"
compatibility_date = "2025-05-01"

# Привязка D1: внутри Worker доступна как env.DB
[[d1_databases]]
binding       = "DB"
database_name = "banya-db"
database_id   = "57254687-7bf1-4bf0-82cb-2e4003ea36c5"

# Привязка R2 (файлы планировок): внутри Worker доступна как env.FILES
[[r2_buckets]]
binding     = "FILES"
bucket_name = "kubrdom-files"

# Telegram: chat_id супергруппы (не секрет). Токен бота — в секрете TG_BOT_TOKEN.
[vars]
TG_CHAT_ID = "-1003606281018"
