<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><style>
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.65; }
}

*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,sans-serif}
body{background:linear-gradient(160deg,#f4f7fa,#edf1f5);min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
</style></head>
<body><div id="app" style="padding:16px;font:14px -apple-system,sans-serif;color:#888">Загрузка портала… (если этот текст остался — скрипт не выполнился)</div>
<script>
// Видимый перехватчик ошибок: вместо белого экрана покажет текст на странице
window.addEventListener('error',function(e){var d=document.getElementById('app')||document.body;if(d&&!d.getAttribute('data-err')){d.setAttribute('data-err','1');d.innerHTML='<pre style="padding:16px;font:13px monospace;color:#c0392b;white-space:pre-wrap;word-break:break-word;background:#fff;margin:0">⚠ ОШИБКА:\n'+(e.message||(e.error&&e.error.message)||e.error||'?')+'\n'+(e.filename||'')+' :'+(e.lineno||'?')+':'+(e.colno||'?')+'</pre>';}});
window.addEventListener('unhandledrejection',function(e){var d=document.getElementById('app')||document.body;if(d&&!d.getAttribute('data-err')){d.setAttribute('data-err','1');d.innerHTML='<pre style="padding:16px;font:13px monospace;color:#c0392b;white-space:pre-wrap;background:#fff;margin:0">⚠ PROMISE:\n'+((e.reason&&e.reason.message)||e.reason||'?')+'</pre>';}});
</script>
<script src="admin.js"></script>
</body></html>
